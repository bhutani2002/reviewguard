repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/semgrep/semgrep
    rev: v1.168.0
    hooks:
      - id: semgrep
        args: ['--config', 'p/security', '--error']
